<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aitist Team</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .logo {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff6b35;
    margin-bottom: 20px;
  }
  h1 {
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, #fff 0%, #999 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    line-height: 1.1;
  }
  .tagline {
    color: #555;
    font-size: 1rem;
    text-align: center;
    margin-bottom: 52px;
    letter-spacing: 0.5px;
  }
  .frame-wrap {
    position: relative;
    max-width: 720px;
    width: 100%;
  }
  /* glow ring */
  .frame-wrap::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ff6b35 100%);
    z-index: 0;
    filter: blur(6px);
    opacity: 0.6;
  }
  .photo-card {
    position: relative;
    z-index: 1;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }
  .photo-card img {
    width: 100%;
    display: block;
  }
  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 36px 28px 24px;
    z-index: 2;
  }
  .overlay-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .overlay-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
  }
  .stats {
    display: flex;
    gap: 32px;
    margin-top: 44px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff6b35, #f7931e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: #555;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .footer {
    margin-top: 52px;
    color: #333;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  .footer span { color: #ff6b35; }
</style>
</head>
<body>
  <div class="logo">✦ Aitist</div>
  <h1>The Team<br>Behind the AI</h1>
  <p class="tagline">Building next-generation AI infrastructure, together.</p>

  <div class="frame-wrap">
    <div class="photo-card">
      <img src="photo.jpg" alt="Aitist Team">
      <div class="overlay">
        <div class="overlay-title">Aitist Core Team · 2026</div>
        <div class="overlay-sub">📍 Silicon Valley Meetup</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">10+</div>
      <div class="stat-label">AI Products</div>
    </div>
    <div class="stat">
      <div class="stat-num">3</div>
      <div class="stat-label">Domains</div>
    </div>
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">Ambition</div>
    </div>
  </div>

  <div class="footer">Powered by <span>aitist.ai</span> · Built with AI in 60s</div>
</body>
</html>
