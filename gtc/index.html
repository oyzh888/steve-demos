<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTC 2025 × NVIDIA</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#050508;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
  }
  .badge {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:linear-gradient(135deg,#76b900,#a8d800);
    color:#000;
    font-size:.72rem;
    font-weight:800;
    letter-spacing:2.5px;
    text-transform:uppercase;
    padding:6px 18px;
    border-radius:20px;
    margin-bottom:24px;
  }
  h1 {
    font-size:clamp(2rem,6vw,3.8rem);
    font-weight:900;
    background:linear-gradient(135deg,#fff 30%,#76b900);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:8px;
    text-align:center;
  }
  .subtitle {
    color:#555;
    font-size:1rem;
    margin-bottom:44px;
    text-align:center;
  }
  .photo-wrap {
    position:relative;
    width:100%;
    max-width:680px;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(118,185,0,.2), 0 40px 120px rgba(0,0,0,.7);
  }
  .photo-wrap img {
    width:100%;
    display:block;
  }
  .photo-overlay {
    position:absolute;
    bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,.85));
    padding:32px 28px 24px;
  }
  .photo-label {
    font-size:.72rem;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#76b900;
    margin-bottom:6px;
  }
  .photo-title {
    font-size:1.15rem;
    font-weight:700;
    color:#fff;
  }
  .meta {
    margin-top:32px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .chip {
    background:#0f0f18;
    border:1px solid rgba(255,255,255,.07);
    border-radius:12px;
    padding:10px 20px;
    font-size:.85rem;
    color:#888;
  }
  .chip span { color:#fff; font-weight:600; }
  footer {
    margin-top:52px;
    color:#222;
    font-size:.75rem;
  }
  footer em { color:#76b900; font-style:normal; }
</style>
</head>
<body>
  <div class="badge">✦ GTC 2025</div>
  <h1>NVIDIA GTC</h1>
  <p class="subtitle">San Jose · March 2025 · with NVIDIA friends</p>

  <div class="photo-wrap">
    <img src="photo.jpg" alt="GTC 2025 with NVIDIA friends">
    <div class="photo-overlay">
      <div class="photo-label">📍 San Jose Convention Center</div>
      <div class="photo-title">Catching up with the NVIDIA crew at GTC 2025</div>
    </div>
  </div>

  <div class="meta">
    <div class="chip">📅 <span>March 2025</span></div>
    <div class="chip">🏟 <span>NVIDIA GTC</span></div>
    <div class="chip">🤝 <span>NVIDIA × Aitist</span></div>
  </div>

  <footer>Steve Ouyang · <em>aitist.ai</em></footer>
</body>
</html>
