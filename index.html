<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Aitist Demos</title>
<style>body{font-family:system-ui;max-width:800px;margin:60px auto;padding:0 20px;background:#0a0a0a;color:#fff}
h1{font-size:2.5rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.demos{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:40px}
.card{background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:24px;text-decoration:none;color:#fff;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-4px);border-color:#667eea}
.card h3{margin:0 0 8px;font-size:1.1rem}
.card p{margin:0;color:#888;font-size:.9rem}</style></head>
<body>
<h1>Aitist AI Demos</h1>
<p style="color:#888">Live demos built with AI in minutes.</p>
<div class="demos" id="demos">
<a class="card" href="#"><h3>+ New Demo</h3><p>Coming soon...</p></a>
</div>
</body></html>
